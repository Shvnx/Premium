<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIDEY Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #0a0000; color: #f5f5f5; min-height: 100vh; padding: 20px; }
h1 { font-size: 20px; font-weight: 900; background: linear-gradient(135deg, #fff, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
.subtitle { font-size: 12px; color: #9ca3af; margin-bottom: 20px; }
.card { background: rgba(0,0,0,.5); border: 1px solid rgba(220,38,38,.3); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 13px; font-weight: 700; color: #ef4444; margin-bottom: 14px; }
label { display: block; font-size: 10px; color: #9ca3af; margin-bottom: 5px; margin-top: 12px; text-transform: uppercase; letter-spacing: .8px; font-weight: 700; }
label:first-of-type { margin-top: 0; }
input, select { width: 100%; padding: 10px 12px; background: rgba(0,0,0,.45); border: 1px solid rgba(255,255,255,.1); border-radius: 10px; color: #f5f5f5; font-size: 13px; outline: none; }
input:focus { border-color: rgba(220,38,38,.7); }
.btn { padding: 11px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
.btn-primary { background: linear-gradient(135deg, #dc2626, #991b1b); color: #fff; width: 100%; margin-top: 14px; }
.btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 7px; }
.btn-red { background: rgba(127,29,29,.6); color: #fca5a5; border: 1px solid rgba(220,38,38,.3); }
.btn-outline { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); color: #d1d5db; }
.result { margin-top: 12px; padding: 11px 14px; border-radius: 10px; font-size: 13px; display: none; }
.result.success { background: rgba(20,83,45,.4); border: 1px solid rgba(34,197,94,.3); color: #86efac; }
.result.error { background: rgba(127,29,29,.4); border: 1px solid rgba(220,38,38,.3); color: #fca5a5; }
.key-display { font-family: monospace; font-size: 15px; font-weight: 700; letter-spacing: 2px; color: #34d399; margin-top: 6px; }
.duration-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
.dur-btn { padding: 8px; border-radius: 9px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.04); color: #9ca3af; text-align: center; transition: all .2s; }
.dur-btn.active { background: linear-gradient(135deg, #dc2626, #991b1b); border-color: transparent; color: #fff; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 8px 10px; color: #9ca3af; font-size: 10px; text-transform: uppercase; letter-spacing: .8px; border-bottom: 1px solid rgba(255,255,255,.08); }
td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,.05); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 600; }
.badge-green { background: rgba(16,185,129,.15); color: #34d399; }
.badge-red { background: rgba(239,68,68,.15); color: #f87171; }
.badge-yellow { background: rgba(245,158,11,.15); color: #fbbf24; }
.key-mono { font-family: monospace; font-size: 11px; color: #a5b4fc; letter-spacing: 1px; }
.empty { text-align: center; padding: 24px; color: #4b5563; font-size: 13px; }

/* LOGIN SCREEN */
#loginScreen { position: fixed; inset: 0; background: #0a0000; display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 999; }
.login-card { background: rgba(0,0,0,.6); border: 1px solid rgba(220,38,38,.4); border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 360px; text-align: center; }
.login-logo { font-size: 28px; font-weight: 900; background: linear-gradient(135deg, #fff, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
.login-sub { font-size: 12px; color: #6b7280; margin-bottom: 24px; }
.login-error { color: #fca5a5; font-size: 12px; margin-top: 10px; display: none; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🕷️ SPIDEY</div>
    <div class="login-sub">Admin Panel — Login Required</div>
    <label style="text-align:left;">Username</label>
    <input type="text" id="loginUser" placeholder="admin" />
    <label style="text-align:left; margin-top:12px;">Password</label>
    <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()" />
    <button class="btn btn-primary" onclick="doLogin()">🔐 Login</button>
    <div class="login-error" id="loginError">❌ Wrong username or password!</div>
  </div>
</div>

<!-- MAIN PANEL (hidden until login) -->
<div id="mainPanel" style="display:none;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
    <div>
      <h1>🕷️ SPIDEY Admin</h1>
      <p class="subtitle">License management panel</p>
    </div>
    <button class="btn btn-outline btn-sm" onclick="logout()" style="padding:8px 14px; font-size:12px;">🚪 Logout</button>
  </div>

  <!-- ADD LICENSE -->
  <div class="card">
    <div class="card-title">➕ New License</div>
    <label>License Key</label>
    <div style="display:grid; grid-template-columns:1fr auto; gap:8px;">
      <input type="text" id="licKey" placeholder="XXXX-XXXX-XXXX-XXXX" style="text-transform:uppercase; font-family:monospace;" />
      <button class="btn btn-outline" onclick="generateKey()" style="white-space:nowrap; padding:10px 14px;">🎲</button>
    </div>

    <label>Duration</label>
    <div class="duration-grid">
      <div class="dur-btn" onclick="setDur(10, this)">⚡ Trial<br><span style="font-size:10px;opacity:.7;">10 Min</span></div>
      <div class="dur-btn" onclick="setDur(1440, this)">1 Day</div>
      <div class="dur-btn" onclick="setDur(4320, this)">3 Days</div>
      <div class="dur-btn" onclick="setDur(10080, this)">7 Days</div>
      <div class="dur-btn active" onclick="setDur(43200, this)">30 Days</div>
      <div class="dur-btn" onclick="setDur(525600, this)">1 Year</div>
      <div class="dur-btn" onclick="setDur(99999999, this)" style="grid-column:span 3;">♾️ Lifetime</div>
    </div>
    <input type="hidden" id="duration" value="43200" />
    <button class="btn btn-primary" onclick="addLicense()">➕ Add License</button>
    <div class="result" id="addResult"></div>
  </div>

  <!-- LICENSE LIST -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
      <div class="card-title" style="margin-bottom:0;">📋 All Licenses</div>
      <button class="btn btn-outline btn-sm" onclick="loadLicenses()" style="padding:6px 12px; font-size:11px;">🔄 Refresh</button>
    </div>
    <div id="licenseTable"><div class="empty">Loading...</div></div>
  </div>
</div>

<script>
const API = 'https://premium-29ko.onrender.com';
const ADMIN_USER = 'Spidey';
const ADMIN_PASS = 'Priyox';
const SECRET = 'spidey_admin_2024';

function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  if (user === ADMIN_USER && pass === ADMIN_PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainPanel').style.display = 'block';
    generateKey();
    loadLicenses();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginPass').value = '';
  }
}

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainPanel').style.display = 'none';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

function generateKey() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  const seg = () => Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
  document.getElementById('licKey').value = `${seg()}-${seg()}-${seg()}-${seg()}`;
}

function setDur(val, el) {
  document.getElementById('duration').value = val;
  document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

async function addLicense() {
  const key = document.getElementById('licKey').value.trim().toUpperCase();
  const duration = parseInt(document.getElementById('duration').value);
  if (!key) { showResult('addResult', 'error', '❌ Key daalo!'); return; }
  try {
    const res = await fetch(API + '/add_license', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, duration_minutes: duration, admin_secret: SECRET })
    });
    const data = await res.json();
    if (data.success) {
      showResult('addResult', 'success', `✅ License added!<div class="key-display">${key}</div>`);
      generateKey();
      loadLicenses();
    } else {
      showResult('addResult', 'error', '❌ ' + data.reason);
    }
  } catch(e) {
    showResult('addResult', 'error', '❌ Network error');
  }
}

async function loadLicenses() {
  const tableDiv = document.getElementById('licenseTable');
  tableDiv.innerHTML = '<div class="empty">Loading...</div>';
  try {
    const res = await fetch(API + '/list_licenses', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ admin_secret: SECRET })
    });
    const data = await res.json();
    if (!data.success) { tableDiv.innerHTML = '<div class="empty">❌ ' + data.reason + '</div>'; return; }
    if (!data.licenses.length) { tableDiv.innerHTML = '<div class="empty">Koi license nahi hai abhi</div>'; return; }

    const now = new Date();
    tableDiv.innerHTML = `
      <table>
        <tr><th>Key</th><th>Status</th><th>Expires</th><th></th></tr>
        ${data.licenses.map(l => {
          const expired = l.expires_at && new Date(l.expires_at) < now;
          const activated = !!l.activated_at;
          let badge = '';
          if (!l.is_active) badge = '<span class="badge badge-red">Revoked</span>';
          else if (expired) badge = '<span class="badge badge-red">Expired</span>';
          else if (activated) badge = '<span class="badge badge-green">Active</span>';
          else badge = '<span class="badge badge-yellow">Unused</span>';

          const durLabel = l.duration_minutes === 10 ? '10 Min Trial' :
            l.duration_minutes < 1440 ? l.duration_minutes + ' min' :
            l.duration_minutes < 10080 ? Math.round(l.duration_minutes/1440) + ' day(s)' :
            l.duration_minutes >= 99999 ? 'Lifetime' :
            Math.round(l.duration_minutes/10080) + ' week(s)';

          return `<tr>
            <td><span class="key-mono">${l.key_code}</span><br><span style="font-size:10px;color:#64748b;">${durLabel}</span></td>
            <td>${badge}</td>
            <td style="font-size:11px;color:#64748b;">${l.expires_at ? l.expires_at.slice(0,16) : '—'}</td>
            <td><button class="btn btn-sm btn-red" onclick="deleteLicense(${l.id})">🗑</button></td>
          </tr>`;
        }).join('')}
      </table>`;
  } catch(e) {
    tableDiv.innerHTML = '<div class="empty">❌ Network error</div>';
  }
}

async function deleteLicense(id) {
  if (!confirm('Delete karna chahte ho?')) return;
  try {
    const res = await fetch(API + '/delete_license', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, admin_secret: SECRET })
    });
    const data = await res.json();
    if (data.success) loadLicenses();
    else alert('❌ ' + data.reason);
  } catch(e) { alert('❌ Network error'); }
}

function showResult(id, type, msg) {
  const d = document.getElementById(id);
  d.className = 'result ' + type;
  d.innerHTML = msg;
  d.style.display = 'block';
}
</script>
</body>
</html>
